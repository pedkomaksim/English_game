<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вчимо англійські слова</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #ff6b6b;
            font-size: 2.5rem;
        }
        #game-area, #stats-screen {
            display: none;
            max-width: 800px;
            margin: 0 auto;
        }
        .settings-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto 20px auto;
            text-align: left;
        }
        .settings-box label {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            font-size: 1.1rem;
            margin-top: 5px;
            border-radius: 8px;
            border: 2px solid #ccc;
            box-sizing: border-box;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .primary-btn {
            background-color: #4ecdc4;
            color: white;
            padding: 15px 30px;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        #repeat-btn {
            background-color: #ffe66d;
            color: #333;
            padding: 10px 20px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: white;
            font-size: 5rem;
            padding: 30px 10px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card.correct {
            background-color: #c8e6c9;
            box-shadow: 0 0 20px #4caf50;
        }
        .card.wrong {
            background-color: #ffcdd2;
            animation: shake 0.5s;
        }
        #message {
            font-size: 1.5rem;
            margin-top: 20px;
            height: 60px;
            font-weight: bold;
        }
        .stats-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            line-height: 2;
            margin-bottom: 20px;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <h1>Вчимо слова! 🎓</h1>
    
    <div id="start-screen">
        <p style="font-size: 1.2rem;">Налаштуйте гру перед стартом:</p>
        
        <div class="settings-box">
            <p style="margin-top: 0;">📚 Всього слів у базі: <strong id="total-dict-words">0</strong></p>
            
            <label for="difficulty">Складність:</label>
            <select id="difficulty" onchange="updateSettings()">
                <option value="all">Всі слова</option>
                <option value="easy">Легкі (Тварини, їжа, предмети)</option>
                <option value="medium">Середні (Транспорт, природа)</option>
                <option value="hard">Складні (Довгі слова)</option>
            </select>

            <label for="word-count">Скільки слів грати?</label>
            <small style="display:block; color:#666;">Доступно в категорії: <span id="available-category-words">0</span></small>
            <input type="number" id="word-count" value="10" min="1" max="10">
        </div>

        <button class="primary-btn" onclick="startGame()">Почати гру ▶️</button>
    </div>

    <div id="game-area">
        <div class="controls">
            <p style="font-size: 1.2rem; margin-bottom: 10px;">Слово <span id="word-counter">1</span> з <span id="total-words-game">10</span></p>
            <button id="repeat-btn" onclick="speakCurrentWord(true)">🔊 Повторити слово</button>
        </div>
        <div class="grid" id="cards-grid"></div>
        <div id="message"></div>
    </div>

    <div id="stats-screen">
        <h2>Гру завершено! 🎉</h2>
        <div class="stats-box">
            <p>✅ Правильно (з першої спроби): <strong id="stat-correct">0</strong></p>
            <p>❌ Помилок зроблено: <strong id="stat-wrong" style="color:#f44336;">0</strong></p>
            <p>🔄 Повторів слова (підказок): <strong id="stat-repeats" style="color:#ffb300;">0</strong></p>
        </div>
        <button class="primary-btn" onclick="resetToMenu()">В головне меню 🏠</button>
    </div>

    <script>
        // Словник із доданою складністю (diff: easy, medium, hard)
        const dictionary = [
            { en: "CAT", ua: "КІТ", icon: "🐈", diff: "easy" },
            { en: "DOG", ua: "СОБАКА", icon: "🐕", diff: "easy" },
            { en: "COW", ua: "КОРОВА", icon: "🐄", diff: "easy" },
            { en: "PIG", ua: "СВИНЯ", icon: "🐷", diff: "easy" },
            { en: "FOX", ua: "ЛИСИЦЯ", icon: "🦊", diff: "easy" },
            { en: "APPLE", ua: "ЯБЛУКО", icon: "🍎", diff: "easy" },
            { en: "MILK", ua: "МОЛОКО", icon: "🥛", diff: "easy" },
            { en: "BALL", ua: "МʼЯЧ", icon: "⚽", diff: "easy" },
            { en: "CAR", ua: "МАШИНА", icon: "🚗", diff: "easy" },
            { en: "EGG", ua: "ЯЙЦЕ", icon: "🥚", diff: "easy" },
            
            { en: "BEAR", ua: "ВЕДМІДЬ", icon: "🐻", diff: "medium" },
            { en: "DUCK", ua: "КАЧКА", icon: "🦆", diff: "medium" },
            { en: "FROG", ua: "ЖАБА", icon: "🐸", diff: "medium" },
            { en: "BOAT", ua: "ЧОВЕН", icon: "⛵", diff: "medium" },
            { en: "BIKE", ua: "ВЕЛОСИПЕД", icon: "🚲", diff: "medium" },
            { en: "BUS", ua: "АВТОБУС", icon: "🚌", diff: "medium" },
            { en: "BOOK", ua: "КНИГА", icon: "📖", diff: "medium" },
            { en: "STAR", ua: "ЗІРКА", icon: "⭐", diff: "medium" },
            { en: "MOON", ua: "МІСЯЦЬ", icon: "🌙", diff: "medium" },
            { en: "CHEESE", ua: "СИР", icon: "🧀", diff: "medium" },
            
            { en: "ALLIGATOR", ua: "КРОКОДИЛ", icon: "🐊", diff: "hard" },
            { en: "ELEPHANT", ua: "СЛОН", icon: "🐘", diff: "hard" },
            { en: "KANGAROO", ua: "КЕНГУРУ", icon: "🦘", diff: "hard" },
            { en: "JELLYFISH", ua: "МЕДУЗА", icon: "🪼", diff: "hard" },
            { en: "EGGPLANT", ua: "БАКЛАЖАН", icon: "🍆", diff: "hard" },
            { en: "MUSHROOM", ua: "ГРИБИ", icon: "🍄", diff: "hard" },
            { en: "BIRTHDAY PRESENT", ua: "ПОДАРУНОК", icon: "🎁", diff: "hard" },
            { en: "ENVELOPE", ua: "ЛИСТ", icon: "✉️", diff: "hard" },
            { en: "UMBRELLA", ua: "ПАРАСОЛЬКА", icon: "☔", diff: "hard" },
            { en: "SANDWICH", ua: "БУТЕРБРОД", icon: "🥪", diff: "hard" },
            { en: "ostrich", ua: "СТРАУС", icon: "🦤", diff: "hard" },
            { en: "ox", ua: "бик, віл", icon: "🐂", diff: "hard" },
            { en: "otter", ua: "видра", icon: "🦦", diff: "hard" },
            { en: "octopus", ua: "восьминіг", icon: "🐙", diff: "hard" },
            { en: "quiz", ua: "вікторина", icon: "🙋‍♂️", diff: "hard" },
            { en: "queen", ua: "королева", icon: "👸🏼", diff: "hard" },
            { en: "quilt", ua: "ковдра", icon: "⚠️", diff: "hard" },
            { en: "quarter", ua: "чверть", icon: "1️⃣➗4️⃣", diff: "hard" }
        ];

        let gameQueue = [];
        let currentTargetWord = null;
        let isWaiting = false;
        let wordsToPlay = 10;
        
        let stats = { correct: 0, wrong: 0, repeats: 0 };
        let currentWordAttempts = 0;

        // Ініціалізація меню
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('total-dict-words').textContent = dictionary.length;
            updateSettings();
        });

        // Оновлення доступної кількості слів при зміні складності
        function updateSettings() {
            const diff = document.getElementById('difficulty').value;
            let availableWords = dictionary.length;
            
            if (diff !== 'all') {
                availableWords = dictionary.filter(w => w.diff === diff).length;
            }

            document.getElementById('available-category-words').textContent = availableWords;
            
            const countInput = document.getElementById('word-count');
            countInput.max = availableWords;
            
            // Якщо вибрано більше слів, ніж є в категорії - зменшуємо
            if (parseInt(countInput.value) > availableWords) {
                countInput.value = availableWords;
            }
        }

        function startGame() {
            const diff = document.getElementById('difficulty').value;
            wordsToPlay = parseInt(document.getElementById('word-count').value);

            // Фільтруємо словник за складністю
            let filteredDict = dictionary;
            if (diff !== 'all') {
                filteredDict = dictionary.filter(w => w.diff === diff);
            }

            // Перемішуємо і беремо потрібну кількість
            filteredDict = filteredDict.sort(() => Math.random() - 0.5);
            gameQueue = filteredDict.slice(0, wordsToPlay);

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('stats-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            
            stats = { correct: 0, wrong: 0, repeats: 0 };
            document.getElementById('total-words-game').textContent = wordsToPlay;

            nextRound();
        }

        function resetToMenu() {
            document.getElementById('stats-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
        }

        function speak(text, lang = 'en-US') {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang; 
            utterance.rate = 0.5; 
            window.speechSynthesis.speak(utterance);
        }

        function speakCurrentWord(isUserClick = false) {
            if (currentTargetWord) {
                speak(currentTargetWord.en, 'en-US');
                if (isUserClick) stats.repeats++;
            }
        }

        function nextRound() {
            if (gameQueue.length === 0) {
                showStats();
                return;
            }

            isWaiting = false;
            currentWordAttempts = 0; 
            
            document.getElementById('word-counter').textContent = (wordsToPlay - gameQueue.length) + 1;
            document.getElementById('message').innerHTML = ""; // Очищаємо текст
            
            currentTargetWord = gameQueue.pop();

            // Варіанти відповідей (завжди беремо з усього словника, щоб було 4 картинки)
            let options = [currentTargetWord];
            while (options.length < 4) {
                const randomItem = dictionary[Math.floor(Math.random() * dictionary.length)];
                if (!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }

            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('cards-grid');
            grid.innerHTML = "";
            
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'card';
                btn.textContent = option.icon;
                btn.onclick = () => checkAnswer(option, btn);
                grid.appendChild(btn);
            });

            setTimeout(() => speakCurrentWord(false), 500);
        }

        function checkAnswer(selectedOption, buttonElement) {
            if (isWaiting) return; 

            const messageEl = document.getElementById('message');

            if (selectedOption.en === currentTargetWord.en) {
                buttonElement.classList.add('correct');
                // Виводимо текст, але БЕЗ озвучки
                messageEl.innerHTML = `🎉 Молодець! Так тримати!<br>Це ${currentTargetWord.ua} (${currentTargetWord.en})`;
                messageEl.style.color = "#4caf50";
                isWaiting = true;
                
                if (currentWordAttempts === 0) stats.correct++;
                
                setTimeout(nextRound, 2500);
            } else {
                buttonElement.classList.add('wrong');
                // Виводимо текст помилки БЕЗ озвучки
                messageEl.innerHTML = `🎺 <em>НЕ ВІРНО...</em><br>Спробуй ще раз! 😉`;
                messageEl.style.color = "#f44336";
                
                currentWordAttempts++;
                stats.wrong++;
                
                setTimeout(() => {
                    buttonElement.classList.remove('wrong');
                }, 500);
            }
        }

        function showStats() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('stats-screen').style.display = 'block';
            
            document.getElementById('stat-correct').textContent = stats.correct;
            document.getElementById('stat-wrong').textContent = stats.wrong;
            document.getElementById('stat-repeats').textContent = stats.repeats;
        }
    </script>
</body>
</html>
