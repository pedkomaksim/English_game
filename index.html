<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вчимо англійські слова</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #ff6b6b;
            font-size: 2.5rem;
        }
        #game-area, #stats-screen {
            display: none;
            max-width: 800px;
            margin: 0 auto;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .primary-btn {
            background-color: #4ecdc4;
            color: white;
            padding: 15px 30px;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #repeat-btn {
            background-color: #ffe66d;
            color: #333;
            padding: 10px 20px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: white;
            font-size: 5rem;
            padding: 30px 10px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card.correct {
            background-color: #c8e6c9;
            box-shadow: 0 0 20px #4caf50;
        }
        .card.wrong {
            background-color: #ffcdd2;
            animation: shake 0.5s;
        }
        #message {
            font-size: 2rem;
            margin-top: 20px;
            height: 40px;
            font-weight: bold;
        }
        .stats-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            line-height: 2;
            margin-bottom: 20px;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <h1>Вчимо слова! 🎓</h1>
    
    <div id="start-screen">
        <p style="font-size: 1.2rem;">Натисніть кнопку, щоб почати. Слухайте слово і обирайте правильну картинку!</p>
        <button class="primary-btn" onclick="startGame()">Почати гру ▶️</button>
    </div>

    <div id="game-area">
        <div class="controls">
            <p style="font-size: 1.2rem; margin-bottom: 10px;">Слово <span id="word-counter">1</span> з <span id="total-words">10</span></p>
            <button id="repeat-btn" onclick="speakCurrentWord(true)">🔊 Повторити слово</button>
        </div>
        <div class="grid" id="cards-grid"></div>
        <div id="message"></div>
    </div>

    <div id="stats-screen">
        <h2>Гру завершено! 🎉</h2>
        <div class="stats-box">
            <p>✅ Правильно (з першої спроби): <strong id="stat-correct">0</strong></p>
            <p>❌ Помилок зроблено: <strong id="stat-wrong" style="color:#f44336;">0</strong></p>
            <p>🔄 Повторів слова (підказок): <strong id="stat-repeats" style="color:#ffb300;">0</strong></p>
        </div>
        <button class="primary-btn" onclick="startGame()">Грати ще раз 🔄</button>
    </div>

    <script>
        const dictionary = [
            { en: "ALLIGATOR", ua: "КРОКОДИЛ", icon: "🐊" },
            { en: "AX", ua: "СОКИРА", icon: "🪓" },
            { en: "ANT", ua: "МУРАХА", icon: "🐜" },
            { en: "APPLE", ua: "ЯБЛУКО", icon: "🍎" },
            { en: "BEAR", ua: "ВЕДМІДЬ", icon: "🐻" },
            { en: "BOAT", ua: "ЧОВЕН", icon: "⛵" },
            { en: "BIKE", ua: "ВЕЛОСИПЕД", icon: "🚲" },
            { en: "BUS", ua: "АВТОБУС", icon: "🚌" },
            { en: "BOOK", ua: "КНИГА", icon: "📖" },
            { en: "BAG", ua: "ПОРТФЕЛЬ", icon: "🎒" },
            { en: "BALL", ua: "МʼЯЧ", icon: "⚽" },
            { en: "CAT", ua: "КІТ", icon: "🐈" },
            { en: "COW", ua: "КОРОВА", icon: "🐄" },
            { en: "CAR", ua: "МАШИНА", icon: "🚗" },
            { en: "CHERRY", ua: "ВИШНЯ", icon: "🍒" },
            { en: "CAKE", ua: "ТОРТ", icon: "🎂" },
            { en: "DOG", ua: "СОБАКА", icon: "🐕" },
            { en: "DUCK", ua: "КАЧКА", icon: "🦆" },
            { en: "DEER", ua: "ОЛЕНЬ", icon: "🦌" },
            { en: "DOLL", ua: "ЛЯЛЬКА", icon: "🪆" },
            { en: "BIRTHDAY PRESENT", ua: "ПОДАРУНОК", icon: "🎁" },
            { en: "BALLOON", ua: "КУЛЬКА", icon: "🎈" },
            { en: "STAR", ua: "ЗІРКА", icon: "⭐" },
            { en: "CANDLE", ua: "СВІЧКА", icon: "🕯️" },
            { en: "EGG", ua: "ЯЙЦЕ", icon: "🥚" }
            // Можете додати решту вашого словника сюди
        ];

        const WORDS_PER_GAME = 50; // Скільки слів буде в одній грі
        let gameQueue = [];
        let currentTargetWord = null;
        let isWaiting = false;
        
        // Змінні для статистики
        let stats = { correct: 0, wrong: 0, repeats: 0 };
        let currentWordAttempts = 0;

        function startGame() {
            // Ховаємо зайві екрани
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('stats-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            
            // Скидаємо статистику
            stats = { correct: 0, wrong: 0, repeats: 0 };
            document.getElementById('total-words').textContent = WORDS_PER_GAME;

            // Перемішуємо словник і беремо потрібну кількість слів для гри
            let shuffledDict = [...dictionary].sort(() => Math.random() - 0.5);
            gameQueue = shuffledDict.slice(0, WORDS_PER_GAME);

            nextRound();
        }

        // Функція для озвучування з вибором мови
        function speak(text, lang = 'en-US') {
            window.speechSynthesis.cancel(); // Зупиняємо попередні фрази, якщо були
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang; 
            utterance.rate = 0.5; 
            window.speechSynthesis.speak(utterance);
        }

        // Озвучити поточне слово (англійською)
        function speakCurrentWord(isUserClick = false) {
            if (currentTargetWord) {
                speak(currentTargetWord.en, 'en-US');
                // Якщо користувач сам натиснув кнопку, записуємо це в статистику
                if (isUserClick) {
                    stats.repeats++;
                }
            }
        }

        function nextRound() {
            // Перевіряємо, чи є ще слова в черзі
            if (gameQueue.length === 0) {
                showStats();
                return;
            }

            isWaiting = false;
            currentWordAttempts = 0; // Скидаємо спроби для нового слова
            
            // Оновлюємо лічильник раундів
            document.getElementById('word-counter').textContent = (WORDS_PER_GAME - gameQueue.length) + 1;

            document.getElementById('message').textContent = "";
            document.getElementById('message').style.color = "#333";
            
            // Беремо наступне слово з черги (воно видаляється з черги)
            currentTargetWord = gameQueue.pop();

            // Створюємо варіанти відповідей
            let options = [currentTargetWord];
            while (options.length < 4) {
                const randomItem = dictionary[Math.floor(Math.random() * dictionary.length)];
                if (!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }

            // Перемішуємо картки на екрані
            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('cards-grid');
            grid.innerHTML = "";
            
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'card';
                btn.textContent = option.icon;
                btn.onclick = () => checkAnswer(option, btn);
                grid.appendChild(btn);
            });

            // Автоматично озвучуємо слово на початку раунду (не вважається підказкою)
            setTimeout(() => speakCurrentWord(false), 500);
        }

        function checkAnswer(selectedOption, buttonElement) {
            if (isWaiting) return; 

            const messageEl = document.getElementById('message');

            if (selectedOption.en === currentTargetWord.en) {
                buttonElement.classList.add('correct');
                messageEl.textContent = `Правильно! Це ${currentTargetWord.ua} (${currentTargetWord.en})`;
                messageEl.style.color = "#4caf50";
                isWaiting = true;
                
                // Якщо вгадав без помилок (з першої спроби)
                if (currentWordAttempts === 0) {
                    stats.correct++;
                }
                
                // Озвучка: Молодець, так тримати! (Українською)
                speak("Молодець! Так тримати!", "uk-UA");
                
                setTimeout(nextRound, 2500);
            } else {
                buttonElement.classList.add('wrong');
                messageEl.textContent = "Спробуй ще раз! 😉";
                messageEl.style.color = "#f44336";
                
                // Зараховуємо помилку
                currentWordAttempts++;
                stats.wrong++;
                
                // Озвучка: Сумний тромбон голосом робота (Українською)
                speak("Не вірно... ", "uk-UA");
                
                setTimeout(() => {
                    buttonElement.classList.remove('wrong');
                }, 500);
            }
        }

        function showStats() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('stats-screen').style.display = 'block';
            
            document.getElementById('stat-correct').textContent = stats.correct;
            document.getElementById('stat-wrong').textContent = stats.wrong;
            document.getElementById('stat-repeats').textContent = stats.repeats;
            
            speak("Гру завершено! Ось твої результати.", "uk-UA");
        }
    </script>
</body>
</html>
